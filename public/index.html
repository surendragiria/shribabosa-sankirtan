<!DOCTYPE html>
<html lang="hi-IN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#ea580c" />
    
    <!-- PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="बाबोसा संकीर्तन" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="बाबोसा संकीर्तन" />
    
    <meta name="description" content="बाबोसा संकीर्तन - भजन से भगवान तक | Personal bhajan collection with offline access" />
    
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/logo192.png" />
    
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Tailwind CSS via CDN (required for styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom scrollbar and font styles -->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Devanagari', Roboto, Arial, sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Line clamp utilities (for truncating text) */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
    
    <title>बाबोसा संकीर्तन | Babosa Sankirtan</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Register Service Worker for offline support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(registration) {
              console.log('✅ Service Worker registered. Scope:', registration.scope);
              
              // Check for updates every hour
              setInterval(function() {
                registration.update();
              }, 60 * 60 * 1000);
              
              registration.addEventListener('updatefound', function() {
                var newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('🔄 New version available! Will activate on next reload.');
                    }
                  });
                }
              });
            })
            .catch(function(error) {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      }
      
      // Detect online/offline status
      window.addEventListener('online', function() {
        console.log('🌐 Back online');
      });
      
      window.addEventListener('offline', function() {
        console.log('📴 Gone offline - app will continue to work');
      });
    </script>
  </body>
</html>
